name: City Grid Builder

on:
  schedule:
    - cron: "0 0 * * *"
  push:
    branches: [ main ]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Generate City Grid
        run: node city-grid.js

      - name: Commit result
        run: |
          git config user.name "city-bot"
          git config user.email "city-bot@users.noreply.github.com"
          git add city.txt
          git commit -m "🏙️ update city grid" || echo "no changes"
          git push
