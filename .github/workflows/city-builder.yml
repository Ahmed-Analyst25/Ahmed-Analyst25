name: City Builder

on:
  schedule:
    - cron: "0 0 * * *"  # كل يوم
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build-city:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install node-fetch fs

      - name: Generate City SVG
        run: node city.js
        env:
          GITHUB_USERNAME: Ahmed-Analyst25

      - name: Commit generated city
        run: |
          git config --global user.name "city-bot"
          git config --global user.email "city-bot@users.noreply.github.com"
          git add city.svg
          git commit -m "🌆 update city builder" || echo "No changes"
          git push
