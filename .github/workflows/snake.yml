name: Generate Snake Animation

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@9a84c2a1c8b3f6f8f8b1a8c7c5e2d9c7f2b3a111

      - name: Generate snake animation
        uses: Platane/snk@b7b6c2b8c9f0a1d3e4f567890abcdef123456789
        with:
          github_user_name: Ahmed-Analyst25
          color_snake: "#00E5FF"
          color_dots: "#0A192F,#112240,#64FFDA,#00E5FF"
          outputs: |
            dist/github-contribution-grid-snake.svg
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark

      - name: Deploy to output branch
        uses: peaceiris/actions-gh-pages@bd0f4d0a1f2c3e4d5b6a7980c1d2e3f456789abc
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: dist
          publish_branch: output
